services:
  jobradar:
    container_name: jobradar
    build:
      context: .
      target: production
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - jobradar-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  jobradar-data:
    driver: local
