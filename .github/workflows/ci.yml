name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Audit (Node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Unit-Tests (Services)
        run: npm test
        env:
          DB_PATH: ':memory:'
          NODE_ENV: test

      - name: API-Integrationstests
        run: npm run test:api
        env:
          DB_PATH: ':memory:'
          NODE_ENV: test
          OLLAMA_URL: 'http://localhost:11434'
          PORT: '3001'
